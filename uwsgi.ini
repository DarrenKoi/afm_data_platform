[uwsgi]
# Run from repository root
chdir = %d

# Flask WSGI entrypoint
module = index:application

# Process management
master = true
processes = 4
threads = 2
enable-threads = true

# Networking
http = 0.0.0.0:5000

# Runtime safety
vacuum = true
die-on-term = true
need-app = true
single-interpreter = true
